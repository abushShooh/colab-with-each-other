<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    
    <div class="flex justify-end mb-8">
        <button class="flex items-center gap-2 px-5 py-2.5 border border-indigo-600 text-indigo-700 rounded-lg text-sm font-medium hover:bg-indigo-50 transition">
            Add New <span class="text-lg">+</span>
        </button>
    </div>

    <div class="flex flex-col md:flex-row gap-10">
        
        <div class="w-full md:w-64 flex-shrink-0">
            <div class="relative mb-6">
                <input type="text" placeholder="search..." class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
            </div>

            <h3 class="text-2xl font-bold mb-5 text-gray-900">Company</h3>
            <ul class="space-y-4 text-gray-700">
                <li class="font-semibold text-gray-950">All</li>
                <li class="hover:text-indigo-600 cursor-pointer">Ikea</li>
                <li class="hover:text-indigo-600 cursor-pointer">Marcos</li>
                <li class="hover:text-indigo-600 cursor-pointer">Caressa</li>
                <li class="hover:text-indigo-600 cursor-pointer">Liddy</li>
            </ul>
        </div>

        <div class="flex-1 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

            <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition border border-gray-100 p-1">
                <div class="relative group aspect-[16/10] bg-red-100 rounded-t-lg overflow-hidden">
                    <div class="absolute inset-0 flex items-center justify-center text-gray-400">Rasm 1</div>
                    <div class="absolute bottom-0 left-0 right-0 bg-green-600 text-white text-center py-2.5 text-sm font-medium">
                        эта уже купит
                    </div>
                </div>
                <div class="p-4 text-center">
                    <h4 class="text-lg font-semibold text-red-600 line-through mb-4">Emperor Sofa</h4>
                    <div class="flex items-center justify-center gap-5 text-gray-600">
                        <i class="fas fa-trash text-red-500 cursor-pointer hover:text-red-700"></i>
                        <i class="fas fa-edit text-blue-500 cursor-pointer hover:text-blue-700"></i>
                        <span class="font-bold text-gray-900">99.99</span>
                        <input type="checkbox" checked class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <i class="fas fa-info-circle text-gray-400 cursor-pointer hover:text-gray-600"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition border border-gray-100 p-1">
                <div class="aspect-[16/10] bg-sky-100 rounded-t-lg overflow-hidden flex items-center justify-center text-gray-400">
                    Rasm 2
                </div>
                <div class="p-4 text-center">
                    <h4 class="text-lg font-semibold text-gray-900 mb-4">Invironment Bed</h4>
                    <div class="flex items-center justify-center gap-5 text-gray-600">
                        <i class="fas fa-trash text-red-500 cursor-pointer hover:text-red-700"></i>
                        <i class="fas fa-edit text-blue-500 cursor-pointer hover:text-blue-700"></i>
                        <span class="font-bold text-gray-900">69.99</span>
                        <input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <i class="fas fa-info-circle text-gray-400 cursor-pointer hover:text-gray-600"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition border border-gray-100 p-1">
                <div class="aspect-[16/10] bg-amber-100 rounded-t-lg overflow-hidden flex items-center justify-center text-gray-400">
                    Rasm 3
                </div>
                <div class="p-4 text-center">
                    <h4 class="text-lg font-semibold text-gray-900 mb-4">Sofa Set</h4>
                    <div class="flex items-center justify-center gap-5 text-gray-600">
                        <i class="fas fa-trash text-red-500 cursor-pointer hover:text-red-700"></i>
                        <i class="fas fa-edit text-blue-500 cursor-pointer hover:text-blue-700"></i>
                        <span class="font-bold text-gray-900">69.99</span>
                        <input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <i class="fas fa-info-circle text-gray-400 cursor-pointer hover:text-gray-600"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition border border-gray-100 p-1">
                <div class="aspect-[16/10] bg-emerald-100 rounded-t-lg overflow-hidden flex items-center justify-center text-gray-400">
                    Rasm 4
                </div>
                <div class="p-4 text-center">
                    <h4 class="text-lg font-semibold text-gray-900 mb-4">Chais Bed</h4>
                    <div class="flex items-center justify-center gap-5 text-gray-600">
                        <i class="fas fa-trash text-red-500 cursor-pointer hover:text-red-700"></i>
                        <i class="fas fa-edit text-blue-500 cursor-pointer hover:text-blue-700"></i>
                        <span class="font-bold text-gray-900">109.99</span>
                        <input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <i class="fas fa-info-circle text-gray-400 cursor-pointer hover:text-gray-600"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition border border-gray-100 p-1">
                <div class="aspect-[16/10] bg-rose-100 rounded-t-lg overflow-hidden flex items-center justify-center text-gray-400">
                    Rasm 5
                </div>
                <div class="p-4 text-center">
                    <h4 class="text-lg font-semibold text-gray-900 mb-4">Dining Table</h4>
                    <div class="flex items-center justify-center gap-5 text-gray-600">
                        <i class="fas fa-trash text-red-500 cursor-pointer hover:text-red-700"></i>
                        <i class="fas fa-edit text-blue-500 cursor-pointer hover:text-blue-700"></i>
                        <span class="font-bold text-gray-900">149.99</span>
                        <input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500"></>
                        <i class="fas fa-info-circle text-gray-400 cursor-pointer hover:text-gray-600"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
